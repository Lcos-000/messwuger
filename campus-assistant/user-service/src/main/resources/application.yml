# ==========================================
# 核心主配置 (总闸)
# ==========================================
server:
  port: 8000

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false

  profiles:
    include:
      - mybatis
      - jwt
      - userweblog
      - nacos
      - openfeign
      - sentinel
      - aes
      - static