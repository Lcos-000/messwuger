spring:
  cloud:
    openfeign:
      client:
        config:
          default:
            logger-level: full
            connect-timeout: 50000
            read-timeout: 50000
          order-service:
            logger-level: full
            connect-timeout: 50000
            read-timeout: 50000
            retryable: true #开启重试机制

feign:
  sentinel:
    enabled: true
