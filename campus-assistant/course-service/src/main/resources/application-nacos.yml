spring:
  application:
    name: campus-course-service
  cloud:
    nacos:
      server-addr: localhost:8848
      discovery:
        enabled: true
        namespace: dev

      config:
        namespace: dev
        group: DEFAULT_GROUP
        file-extension: yaml
  config:
    import:
      - nacos:datasource-mysql.yaml?group=DATASOURCE_GROUP
      - nacos:datasource-redis.yaml?group=DATASOURCE_GROUP
      - nacos:common-log.yaml?group=DEFAULT_GROUP