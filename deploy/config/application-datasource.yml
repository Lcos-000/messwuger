# 生产环境数据库 & Redis 配置
# 放在 /opt/campus/config/ 下，会被 Spring Boot 自动加载并覆盖包内配置

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/campus_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  cache:
    type: redis
    redis:
      time-to-live: 3600000
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: CampusRedis@1234
      database: 0
