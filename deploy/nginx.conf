# 校园助手生产环境 Nginx 配置
# 作用：1) 托管前端静态资源  2) 反向代理 /gateway 到 Java Gateway

server {
    listen 80;
    server_name _;          # 接受任意 Host，有域名后改成你的域名

    # 前端静态资源（由 campus-web npm run build 生成到 dist 目录）
    location / {
        root /opt/campus-assistant/campus-web/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 后端网关统一入口
    location /gateway/ {
        proxy_pass http://127.0.0.1:8080/;   # Java Gateway 跑在 8080（避免 Linux 非 root 不能用 80）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Go 爬虫服务如需公网暴露测试接口，可单独代理（可选，建议内网不暴露）
    # location /spider/ {
    #     proxy_pass http://127.0.0.1:8082/;
    # }
}
