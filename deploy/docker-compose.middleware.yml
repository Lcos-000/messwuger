version: "3.8"

# 中间件统一部署：MySQL + Redis + Nacos + Sentinel
# Java / Go / 前端 程序仍用 systemd / 脚本直接运行在宿主机

services:
  mysql:
    image: mysql:9.7.0
    container_name: campus-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: campus_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - campus_mysql_fresh_data:/var/lib/mysql
      - ./mysql/conf:/etc/mysql/conf.d
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - campus-net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-p1234" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.8.0
    container_name: campus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - campus-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.4.0-slim
    container_name: campus-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ./nacos/logs:/home/nacos/logs
      - ./nacos/data:/home/nacos/data
    networks:
      - campus-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8848/nacos" ]
      interval: 15s
      timeout: 10s
      retries: 5

  sentinel:
    image: bladex/sentinel-dashboard:1.8.9
    container_name: campus-sentinel
    restart: unless-stopped
    ports:
      - "8858:8858"
    environment:
      TZ: Asia/Shanghai
    networks:
      - campus-net

volumes:
  campus_mysql_fresh_data:
    name: campus_mysql_fresh_data

networks:
  campus-net:
    driver: bridge
